---
name: ci

on:
  push:
    branches:
      - main
    tags-ignore:
      - "*"
  pull_request:
    branches:
      - main
  workflow_dispatch: {}
  schedule:
    - cron: 0 * * * *

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: openrewrite/gh-automation/.github/workflows/ci-gradle.yml@main
    secrets:
      gradle_enterprise_access_key: ${{ secrets.GRADLE_ENTERPRISE_ACCESS_KEY }}
      sonatype_username: ${{ secrets.SONATYPE_USERNAME }}
      sonatype_token: ${{ secrets.SONATYPE_TOKEN }}
      ossrh_signing_key: ${{ secrets.OSSRH_SIGNING_KEY }}
      ossrh_signing_password: ${{ secrets.OSSRH_SIGNING_PASSWORD }}
      OPS_GITHUB_ACTIONS_WEBHOOK: ${{ secrets.OPS_GITHUB_ACTIONS_WEBHOOK }}

  probe-maven-central:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        mirror:
          - name: repo1
            url: https://repo1.maven.org/maven2
          - name: apache
            url: https://repo.maven.apache.org/maven2
    steps:
      - name: Probe artifacts that 404'd in nightly CI
        env:
          BASE_URL: ${{ matrix.mirror.url }}
          MIRROR_NAME: ${{ matrix.mirror.name }}
        run: |
          set -u
          # Same artifacts that failed in run 25393558316.
          paths=(
            "org/springframework/security/spring-security-crypto/5.6.3/spring-security-crypto-5.6.3.pom"
            "org/springframework/security/spring-security-bom/5.5.1/spring-security-bom-5.5.1.pom"
            "org/testcontainers/testcontainers-bom/1.18.3/testcontainers-bom-1.18.3.pom"
            "com/google/inject/guice-bom/5.0.1/guice-bom-5.0.1.pom"
            "com/google/inject/guice-bom/6.0.0/guice-bom-6.0.0.pom"
          )

          probe() {
            local i=$1 path=$2
            local out hdrs body code
            hdrs=$(mktemp); body=$(mktemp)
            out=$(curl -sS -o "$body" -D "$hdrs" -A "Java/25" \
              -w '%{http_code} retry_after=%header{retry-after} cf_ray=%header{cf-ray} cf_cache=%header{cf-cache-status} age=%header{age} cache_control=%header{cache-control} expires=%header{expires} via=%header{via} server=%header{server} t=%{time_total}s' \
              --max-time 30 "${BASE_URL}/${path}" 2>&1) || true
            printf '[%s] iter=%03d %s -> %s\n' "$MIRROR_NAME" "$i" "$path" "$out"
            code=${out%% *}
            if [[ "$code" == "404" ]]; then
              printf '[%s] iter=%03d %s --- 404 full headers ---\n' "$MIRROR_NAME" "$i" "$path"
              sed 's/^/    /' "$hdrs"
              printf '[%s] iter=%03d %s --- 404 body (first 500 bytes) ---\n' "$MIRROR_NAME" "$i" "$path"
              head -c 500 "$body" | sed 's/^/    /'
              printf '\n[%s] iter=%03d %s --- end ---\n' "$MIRROR_NAME" "$i" "$path"
            fi
            rm -f "$hdrs" "$body"
          }
          export -f probe
          export BASE_URL MIRROR_NAME

          echo "=== Sequential warm-up (5 reqs) ==="
          for i in $(seq 1 5); do
            for p in "${paths[@]}"; do probe "$i" "$p"; done
          done

          echo "=== Parallel burst (50 reqs x 5 paths = 250, -P 16) ==="
          for i in $(seq 1 50); do
            for p in "${paths[@]}"; do
              printf '%s\t%s\n' "$i" "$p"
            done
          done | xargs -n2 -P16 bash -c 'probe "$0" "$1"'

          echo "=== Tally ==="
          # Re-run quickly, count status codes, and capture headers/body for the first 5 non-200s.
          tally_dir=$(mktemp -d)
          tally_one() {
            local p=$1 dir=$2 hdrs body line code
            hdrs=$(mktemp); body=$(mktemp)
            line=$(curl -sS -o "$body" -D "$hdrs" -A "Java/25" \
              -w '%{http_code} cf_ray=%header{cf-ray} cf_cache=%header{cf-cache-status} age=%header{age}' \
              --max-time 30 "${BASE_URL}/${p}" 2>&1) || true
            code=${line%% *}
            echo "$code" >> "$dir/codes"
            if [[ "$code" != "200" ]]; then
              # Write each non-200 to its own file to avoid interleaving between parallel writers.
              {
                printf -- '--- non-200 sample: %s -> %s ---\n' "$p" "$line"
                printf '  request headers were sent with -A "Java/25"\n'
                printf '  response headers:\n'
                sed 's/^/    /' "$hdrs"
                printf '  response body (first 500 bytes):\n'
                head -c 500 "$body" | sed 's/^/    /'
                printf '\n--- end ---\n'
              } > "$(mktemp "$dir/non200.XXXXXX")"
            fi
            rm -f "$hdrs" "$body"
          }
          export -f tally_one
          export BASE_URL
          for i in $(seq 1 100); do
            for p in "${paths[@]}"; do
              tally_one "$p" "$tally_dir" &
            done
            wait
          done
          echo "Counts:"
          sort "$tally_dir/codes" | uniq -c | sort -rn
          shopt -s nullglob
          samples=("$tally_dir"/non200.*)
          if (( ${#samples[@]} > 0 )); then
            echo "Non-200 samples (showing first 5 of ${#samples[@]}):"
            for f in "${samples[@]:0:5}"; do cat "$f"; done
          else
            echo "No non-200 responses captured."
          fi
          rm -rf "$tally_dir"
